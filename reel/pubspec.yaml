name: reel
description: AI가 자동으로 추억 앨범을 만들어주는 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 갤러리 접근
  photo_manager: ^3.3.0

  # ML Kit (온디바이스 AI - 무료/오프라인)
  google_mlkit_image_labeling: ^0.13.0
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_face_detection: ^0.11.0

  # 로컬 DB
  sqflite: ^2.3.2
  path_provider: ^2.1.3

  # GPS → 지역명 변환
  geocoding: ^3.0.0

  # 상태관리
  flutter_riverpod: ^2.5.1

  # 라우팅
  go_router: ^14.2.0

  # 이미지 캐시
  cached_network_image: ^3.4.0

  # 로딩 애니메이션
  shimmer: ^3.0.0

  # 날짜 포맷
  intl: ^0.19.0

  # 설정 저장
  shared_preferences: ^2.3.1

  # EXIF 파싱
  exif: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Reel_logo_2.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/
