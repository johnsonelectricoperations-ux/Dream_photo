<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Reel — 이벤트 상세</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px 0;
  }
  .phone {
    width: 390px;
    min-height: 844px;
    background: #F8F8F8;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }
  /* 커버 이미지 영역 */
  .cover-area {
    height: 320px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f5576c 100%);
    position: relative;
  }
  .cover-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.7) 100%);
  }
  .back-btn {
    position: absolute;
    top: 52px; left: 20px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 18px;
  }
  .share-btn {
    position: absolute;
    top: 52px; right: 20px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 16px;
  }
  .cover-info {
    position: absolute;
    bottom: 20px; left: 20px; right: 20px;
  }
  .event-title {
    font-size: 28px;
    font-weight: 800;
    color: white;
    letter-spacing: -0.8px;
    margin-bottom: 8px;
  }
  .meta-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chip {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 12px;
    color: white;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* 콘텐츠 영역 */
  .content {
    padding: 20px;
    overflow-y: auto;
    max-height: 500px;
    padding-bottom: 100px;
  }

  /* AI 태그 */
  .tags-section {
    margin-bottom: 20px;
  }
  .tags-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tag {
    background: #F0F0F5;
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 13px;
    color: #1A1A2E;
    font-weight: 500;
  }
  .tag.highlight {
    background: rgba(233,69,96,0.1);
    color: #E94560;
  }

  /* 사진 그리드 */
  .grid-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .grid-title {
    font-size: 16px;
    font-weight: 700;
    color: #1A1A2E;
  }
  .select-all {
    font-size: 13px;
    font-weight: 600;
    color: #E94560;
  }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    border-radius: 12px;
    overflow: hidden;
  }
  .photo-cell {
    aspect-ratio: 1;
    position: relative;
    overflow: hidden;
  }
  .photo-cell .photo-bg {
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
  }
  .photo-cell.selected::after {
    content: '✓';
    position: absolute;
    top: 6px; right: 6px;
    width: 20px; height: 20px;
    background: #E94560;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: white;
    font-weight: 700;
  }
  .p1 { background: linear-gradient(135deg, #667eea, #764ba2); }
  .p2 { background: linear-gradient(135deg, #f093fb, #f5576c); }
  .p3 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
  .p4 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
  .p5 { background: linear-gradient(135deg, #fa709a, #fee140); }
  .p6 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
  .p7 { background: linear-gradient(135deg, #fccb90, #d57eeb); }
  .p8 { background: linear-gradient(135deg, #a1c4fd, #c2e9fb); }
  .p9 { background: linear-gradient(135deg, #fd7043, #ff8a65); }

  /* 포토북 버튼 */
  .photobook-fab {
    position: absolute;
    bottom: 90px; left: 20px; right: 20px;
    background: linear-gradient(135deg, #1A1A2E, #16213E);
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 8px 32px rgba(26,26,46,0.4);
  }
  .fab-left { display: flex; align-items: center; gap: 12px; }
  .fab-icon {
    width: 44px; height: 44px;
    background: rgba(233,69,96,0.2);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .fab-text .title {
    font-size: 15px; font-weight: 700; color: white; margin-bottom: 2px;
  }
  .fab-text .desc {
    font-size: 12px; color: rgba(255,255,255,0.5);
  }
  .fab-arrow {
    width: 32px; height: 32px;
    background: #E94560;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 16px;
  }

  /* 하단 네비게이션 */
  .bottom-nav {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(0,0,0,0.06);
    padding: 12px 0 24px;
    display: flex;
    justify-content: space-around;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .nav-icon { font-size: 22px; color: #C0C0C0; }
  .nav-label { font-size: 10px; font-weight: 600; color: #C0C0C0; }
  .nav-item.active .nav-icon,
  .nav-item.active .nav-label { color: #E94560; }
</style>
</head>
<body>
<div class="phone">
  <!-- 커버 -->
  <div class="cover-area">
    <div class="cover-overlay"></div>
    <div class="back-btn">←</div>
    <div class="share-btn">↑</div>
    <div class="cover-info">
      <div class="event-title">강릉 여름 여행</div>
      <div class="meta-chips">
        <div class="chip">📅 2024.08.01 ~ 03</div>
        <div class="chip">📍 강릉</div>
        <div class="chip">🖼 24장</div>
      </div>
    </div>
  </div>

  <!-- 콘텐츠 -->
  <div class="content">
    <!-- AI 자동 태그 -->
    <div class="tags-section">
      <div class="tags-row">
        <div class="tag highlight">🌊 해변</div>
        <div class="tag highlight">🌅 노을</div>
        <div class="tag">음식</div>
        <div class="tag">도시</div>
        <div class="tag">야외</div>
        <div class="tag">가족</div>
      </div>
    </div>

    <!-- 사진 그리드 -->
    <div class="grid-header">
      <span class="grid-title">사진 24장</span>
      <span class="select-all">선택하기</span>
    </div>
    <div class="photo-grid">
      <div class="photo-cell selected"><div class="photo-bg p1"></div></div>
      <div class="photo-cell"><div class="photo-bg p2"></div></div>
      <div class="photo-cell"><div class="photo-bg p3"></div></div>
      <div class="photo-cell"><div class="photo-bg p4"></div></div>
      <div class="photo-cell"><div class="photo-bg p5"></div></div>
      <div class="photo-cell"><div class="photo-bg p6"></div></div>
      <div class="photo-cell"><div class="photo-bg p7"></div></div>
      <div class="photo-cell"><div class="photo-bg p8"></div></div>
      <div class="photo-cell"><div class="photo-bg p9"></div></div>
    </div>
  </div>

  <!-- 포토북 CTA -->
  <div class="photobook-fab">
    <div class="fab-left">
      <div class="fab-icon">📖</div>
      <div class="fab-text">
        <div class="title">포토북 만들기</div>
        <div class="desc">스냅스 연동 · 3일 배송</div>
      </div>
    </div>
    <div class="fab-arrow">→</div>
  </div>

  <!-- 하단 네비게이션 -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <span class="nav-icon">⊞</span>
      <span class="nav-label">홈</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">◎</span>
      <span class="nav-label">추억</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">⊕</span>
      <span class="nav-label">공유</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">☰</span>
      <span class="nav-label">설정</span>
    </div>
  </div>
</div>
</body>
</html>
