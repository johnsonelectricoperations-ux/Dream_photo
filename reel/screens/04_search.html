<!DOCTYPE html>
<!-- Reel 검색 화면: 키워드·태그·날짜로 사진을 찾는 화면 -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Reel — 검색</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px 0;
  }
  .phone {
    width: 390px;
    min-height: 844px;
    background: #F8F8F8;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
  }

  /* 헤더 */
  .header {
    background: #1A1A2E;
    padding: 52px 20px 20px;
  }
  .header-title {
    font-size: 24px;
    font-weight: 800;
    color: white;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
  }

  /* 검색창 */
  .search-bar {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .search-icon { font-size: 18px; color: rgba(255,255,255,0.5); }
  .search-input {
    flex: 1;
    font-size: 16px;
    color: white;
    background: none;
    border: none;
    outline: none;
    font-family: inherit;
  }
  .search-input::placeholder { color: rgba(255,255,255,0.35); }

  /* 콘텐츠 */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    padding-bottom: 90px;
  }

  .section-title {
    font-size: 14px;
    font-weight: 700;
    color: #8A8A9A;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }

  /* 추천 태그 */
  .tags-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .tag {
    background: white;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 100px;
    padding: 8px 16px;
    font-size: 13px;
    color: #1A1A2E;
    font-weight: 500;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tag.active {
    background: rgba(233,69,96,0.1);
    border-color: rgba(233,69,96,0.2);
    color: #E94560;
  }

  /* 최근 검색 */
  .recent-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 28px;
  }
  .recent-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: 12px;
    background: white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .recent-icon {
    width: 36px; height: 36px;
    background: #F0F0F5;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .recent-text { flex: 1; }
  .recent-keyword { font-size: 14px; font-weight: 600; color: #1A1A2E; }
  .recent-count { font-size: 12px; color: #8A8A9A; margin-top: 2px; }
  .recent-arrow { color: #C0C0C0; font-size: 14px; }

  /* 사진 검색 결과 그리드 */
  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .result-count { font-size: 13px; color: #8A8A9A; }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    border-radius: 16px;
    overflow: hidden;
  }
  .photo-cell {
    aspect-ratio: 1;
    position: relative;
    overflow: hidden;
  }
  .photo-cell .photo-bg {
    width: 100%; height: 100%;
  }
  .photo-cell .photo-label {
    position: absolute;
    bottom: 6px; left: 6px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
    border-radius: 6px;
    padding: 2px 6px;
    font-size: 10px;
    color: white;
    font-weight: 600;
  }
  .p1 { background: linear-gradient(135deg, #667eea, #764ba2); }
  .p2 { background: linear-gradient(135deg, #f093fb, #f5576c); }
  .p3 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
  .p4 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
  .p5 { background: linear-gradient(135deg, #fa709a, #fee140); }
  .p6 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }

  /* 하단 네비게이션 */
  .bottom-nav {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(0,0,0,0.06);
    padding: 12px 0 24px;
    display: flex;
    justify-content: space-around;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .nav-icon { font-size: 22px; color: #C0C0C0; }
  .nav-label { font-size: 10px; font-weight: 600; color: #C0C0C0; }
  .nav-item.active .nav-icon,
  .nav-item.active .nav-label { color: #E94560; }
</style>
</head>
<body>
<div class="phone">
  <!-- 헤더 + 검색창 -->
  <div class="header">
    <div class="header-title">사진 찾기</div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="장소, 사람, 음식…" value="해변">
    </div>
  </div>

  <!-- 콘텐츠 -->
  <div class="content">

    <!-- AI 추천 태그 -->
    <div class="section-title">AI 추천 태그</div>
    <div class="tags-row">
      <div class="tag active">🌊 해변</div>
      <div class="tag">🌅 노을</div>
      <div class="tag">🍜 음식</div>
      <div class="tag">🏔 산</div>
      <div class="tag">🎂 생일</div>
      <div class="tag">🏠 집</div>
      <div class="tag">🌸 봄</div>
      <div class="tag">❄️ 겨울</div>
    </div>

    <!-- 검색 결과 -->
    <div class="result-header">
      <div class="section-title" style="margin-bottom:0">검색 결과</div>
      <div class="result-count">사진 17장</div>
    </div>
    <div class="photo-grid">
      <div class="photo-cell"><div class="photo-bg p3"></div><div class="photo-label">강릉</div></div>
      <div class="photo-cell"><div class="photo-bg p1"></div><div class="photo-label">부산</div></div>
      <div class="photo-cell"><div class="photo-bg p5"></div><div class="photo-label">제주</div></div>
      <div class="photo-cell"><div class="photo-bg p2"></div></div>
      <div class="photo-cell"><div class="photo-bg p4"></div><div class="photo-label">속초</div></div>
      <div class="photo-cell"><div class="photo-bg p6"></div></div>
    </div>
  </div>

  <!-- 하단 네비게이션 -->
  <div class="bottom-nav">
    <div class="nav-item">
      <span class="nav-icon">⊞</span>
      <span class="nav-label">홈</span>
    </div>
    <div class="nav-item active">
      <span class="nav-icon">🔍</span>
      <span class="nav-label">검색</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">⊕</span>
      <span class="nav-label">공유</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">☰</span>
      <span class="nav-label">설정</span>
    </div>
  </div>
</div>
</body>
</html>
